<!DOCTYPE html>

<html>

<head>

<style>

body{

margin:0;

background:transparent;

font-family:Arial;

}


#box{

background:rgba(0,0,0,.65);

color:white;

padding:12px;

border-radius:10px;

font-size:18px;

}


</style>

</head>


<body>


<div id="box">

</div>



<script>


const box =
document.getElementById(
"box"
);



function update(state){



let text="";



if(state==="HOME"){

text=
"A Select<br>"+
"B Back<br>"+
"Y Search<br>"+
"Start Menu";

}



if(state==="VIDEO"){

text=
"A Select<br>"+
"B Back<br>"+
"LT/RT Volume<br>"+
"LB/RB Skip<br>"+
"Start Pause";

}



if(state==="SEARCH"){

text=
"A Confirm<br>"+
"B Close<br>"+
"X Backspace<br>"+
"Y Clear";

}



box.innerHTML=text;


}



window.electronAPI?.onOverlay(
update
);



</script>


</body>

</html>
