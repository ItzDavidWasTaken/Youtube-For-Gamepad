<!DOCTYPE html>

<html>

<head>

<style>

body{

margin:0;

background:transparent;

font-family:"Segoe UI",Arial,sans-serif;

}


#box{

box-sizing:border-box;

width:100%;

height:100%;

background:#050505;

color:white;

display:flex;

align-items:center;

padding:0 96px;

overflow:hidden;

}


.control{

display:flex;

align-items:center;

min-height:24px;

font-size:24px;

line-height:28px;

white-space:nowrap;

}


#controls{

display:flex;

align-items:center;

gap:36px;

}


.control kbd{

margin-right:12px;

}


kbd{

display:inline-flex;

align-items:center;

justify-content:center;

width:30px;

height:30px;

box-sizing:border-box;

margin-right:9px;

background:#65c83f;

border-radius:50%;

color:white;

font-family:inherit;

font-size:16px;

font-weight:700;

letter-spacing:0;

}


.control:nth-child(2) kbd{

background:#ed4c56;

}


.control:nth-child(3) kbd{

background:#4d86d8;

}


.control:nth-child(4) kbd{

background:#d59b3d;

}


.action{

color:rgba(255,255,255,.88);

}


.bumper{

width:46px;

border-radius:8px;

background:#4d86d8;

font-size:12px;

}


.control:nth-child(4) .bumper{

background:#d59b3d;

}


.start{

width:30px;

background:#d59b3d;

}


.start span{

display:block;

width:14px;

height:2px;

margin:2px 0;

background:white;

}


</style>

</head>


<body>


<div id="box">

</div>

<script>

const box =
document.getElementById(
"box"
);



function update(data){


const state =
typeof data === "string" ? data : data?.state;



let text="";

if(state==="HOME"){

text=
'<div class="control"><kbd>A</kbd><span class="action">Select</span></div>'+
'<div class="control"><kbd>B</kbd><span class="action">Back</span></div>';

}



if(state==="VIDEO"){

text=
'<div class="control"><kbd>A</kbd><span class="action">Select</span></div>'+
'<div class="control"><kbd>B</kbd><span class="action">Back</span></div>'+
'<div class="control"><kbd class="bumper">LB</kbd><span class="action">Skip back</span></div>'+
'<div class="control"><kbd class="bumper">RB</kbd><span class="action">Skip forward</span></div>'+
'<div class="control"><kbd class="start"><span></span><span></span><span></span></kbd><span class="action">Pause</span></div>';

}



if(state==="SEARCH"){

text=
'<div class="control"><kbd>A</kbd><span class="action">Select</span></div>'+
'<div class="control"><kbd>B</kbd><span class="action">Back</span></div>';

}



box.innerHTML=
'<div id="controls">'+text+'</div>';


}



window.controllerAPI?.onOverlay(
update
);



</script>


</body>

</html>
