name: Build YouTube TV App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        run: npm run build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-TV-App
          path: dist/*.exe